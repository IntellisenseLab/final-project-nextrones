# Simple Mapper Params for Pi 5
# Source: standard ROS 2 slam_toolbox defaults
# optimized for Kinect (depth to laser)

async_slam_toolbox_node:
  ros__parameters:

    # Solver Parameters
    solver_plugin: solver_plugins::STS_SPA_solver
    optimization_step_cost_threshold: 0.02
    max_iterations: 10
    optimization_step_length: 0.5
    optimization_step_threshold: 0.1

    # Toolbox Parameters
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    mode: mapping 

    # Matcher Parameters
    distance_variance_penalty: 0.5      
    angle_variance_penalty: 0.5    

    fine_search_angle_offset: 0.00349     
    coarse_search_angle_offset: 0.349   
    coarse_angle_resolution: 0.0349        
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true

    # Scan Matcher
    use_scan_matcher: true
    use_scan_barycenter: true
    minimum_travel_distance: 0.1
    minimum_travel_heading: 0.1
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 10.0
    link_match_maximum_distance_ratio: 0.2
    link_scan_maximum_distance_ratio: 0.5
    
    # Mapping
    resolution: 0.05
    max_laser_range: 20.0
    minimum_time_interval: 0.5
    transform_timeout: 0.2
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000 
    enable_interactive_mode: true